name: Trimly CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 11.10.0

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Shared Packages
      run: |
        pnpm --filter @trimly/database build
        pnpm --filter @trimly/types build

    - name: Run Backend Compilation
      run: pnpm --filter @trimly/backend build
